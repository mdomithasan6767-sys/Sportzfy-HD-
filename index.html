<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Sportzfy TV - লাইভ স্পোর্টস ও টিভি</title>
    
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <style>
        :root {
            --primary: #00ff88;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            margin: 0; padding: 0;
        }
        
        *:focus {
            outline: none;
        }
        
        .glass {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
        }
        .nav-bottom {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--glass-border);
        }
        
        /* নিচের নেভিগেশন বাটন স্টাইল */
        .nav-btn {
            transition: all 0.2s ease;
            cursor: pointer;
            background: transparent;
            box-shadow: none !important;
        }
        
        .nav-btn:active {
            transform: scale(0.96);
        }
        
        .nav-btn:focus {
            outline: none !important;
            box-shadow: none !important;
            background: transparent !important;
        }
        
        .nav-btn.active-nav {
            color: #00ff88 !important;
        }
        
        .nav-btn.active-nav i,
        .nav-btn.active-nav span {
            color: #00ff88 !important;
        }
        
        .nav-btn i,
        .nav-btn span {
            color: #9ca3af;
            transition: color 0.2s ease;
        }
        
        .active-tab {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }
        .scrolling-text {
            white-space: nowrap;
            animation: scroll 20s linear infinite;
        }
        @keyframes scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .channel-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .channel-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }
        
        .channel-card:focus, 
        .event-card:focus, 
        .cat-item:focus, 
        .category-btn:focus {
            outline: 1px solid #00ff88 !important;
            outline-offset: 1px !important;
            transform: scale(1.01) !important;
            background: rgba(0, 255, 136, 0.1) !important;
            box-shadow: none !important;
        }
        
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        .sports-circle {
            width: 75px; height: 75px;
            border-radius: 50%;
            border: 1px solid var(--primary);
            background: #1e293b;
            padding: 0px;
            display: flex; align-items: center; justify-content: center; margin: 0 auto;
            overflow: hidden;
        }
        .sports-circle img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 50%;
        }
        
        .channel-logo {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            background: white;
            padding: 5px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }
        
        .cat-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 12px; padding: 12px;
            display: flex; align-items: center; gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cat-item:hover, .cat-item:focus {
            background: rgba(0, 255, 136, 0.1);
            border-color: var(--primary);
            outline: none;
        }
        
        .event-card {
            background: linear-gradient(135deg, #111827, #1a1f2e);
            border: 1.5px solid #00ff8855;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .event-card:hover, .event-card:focus {
            border-color: #00ff88;
            transform: scale(1.01);
            outline: none;
        }
        .live-dot {
            height: 8px; width: 8px;
            background-color: #ff4d4d;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #ff4d4d;
            animation: pulse 1.5s infinite;
        }
        .event-logo {
            width: 50px;
            height: 50px; 
            border-radius: 50%;
            object-fit: cover;
            background: #1e293b;
            padding: 0px;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .bd-time {
            font-family: 'monospace';
            font-size: 0.75rem;
            color: #00ff88;
        }
        .loading-spinner {
            text-align: center;
            padding: 2px;
            color: #00ff88;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }
        
        .sports-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        
        @media (max-width: 640px) {
            .sports-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        .category-btn {
            transition: all 0.2s;
            cursor: pointer;
        }
        .category-btn.active-tab {
            background: #00ff8822;
            border-bottom: 2px solid #00ff88;
            color: #00ff88;
        }
        
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e2e;
        }
        ::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 4px;
        }
        #drawerOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            backdrop-filter: blur(3px);
        }
        
        /* ========== লোডিং স্ক্রিন স্টাইল ========== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .loading-screen.hide {
            opacity: 0;
            visibility: hidden;
        }
        
        /* লোগো ধারক - গোলাকার */
        .loader-logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 10px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ff8844, #00ff8822);
            animation: pulseGlow 1.5s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 0px;
        }
        .loader-logo img {
            width: 110%;
            height: 105%;
            object-fit: cover;
            border-radius: 50%;
        }
        
        /* লোগোর চারপাশের পালস ইফেক্ট */
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 #00ff8844; }
            70% { box-shadow: 0 0 0 25px #00ff8800; }
            100% { box-shadow: 0 0 0 0 #00ff8800; }
        }
        
        /* স্পিনার আইকন - ঘুরবে */
        .loader-spinner {
            width: 40px;
            height: 50px;
            margin: 10px auto;
            position: relative;
        }
        .loader-spinner i {
            font-size: 20px;
            color: #00ff88;
            animation: spin 1s linear infinite;
            display: block;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* অ্যাপের নাম */
        .loader-name {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            background: linear-gradient(135deg, #00ff88, #00cc66);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 15px;
        }
        
        /* ট্যাগলাইন */
        .loader-tagline {
            text-align: center;
            color: #94a3b8;
            font-size: 15px;
            margin-top: 1px;
        }
        /* ========== লোডিং স্ক্রিন স্টাইল শেষ ========== */
        
        .video-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw !important;
            height: 100vh !important;
            background: #000000;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            margin: 0 !important; padding: 0 !important; 
            overflow: hidden !important;
        }
        .video-modal.active {
            opacity: 1;
            visibility: visible;
        }
        .video-modal-content {
            width: 100% !important;
            height: 100% !important;
            background: #000000;
            position: relative;
            margin: 0 !important; padding: 0 !important; 
            overflow: hidden !important;
        }
        
        .player-back-icon {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 2147483647; 
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(0, 0, 0, 0.6);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        
        #jwPlayerContainer {
            width: 100% !important;
            height: 100% !important;
            margin: 0 !important; padding: 0 !important;
        }

        #jwPlayerContainer video {
            object-fit: fill !important;
            width: 100% !important;
            height: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
        }
        
        .telegram-popup-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 200;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
        }
        .telegram-popup-overlay.show {
            transform: translateY(0);
        }
        .telegram-popup {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 24px 24px 0 0;
            border-top: 1px solid #00ff8844;
            box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.5);
        }
        
        #mainAppContent {
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #mainAppContent.visible {
            opacity: 1;
        }
        
        #searchInput:focus {
            outline: 1px solid #00ff88;
            outline-offset: 1px;
        }
    </style>

    <script>
        function setActiveNav(activeId) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active-nav');
            });
            const activeBtn = document.getElementById(activeId);
            if(activeBtn) {
                activeBtn.classList.add('active-nav');
            }
        }
        
        const DEFAULT_LOGO_URL = "https://i.postimg.cc/yYvM1dRS/20260610-235713.png";
        
        jwplayer.key = "uoW6qHjBL3KNudxKVnwa3rt5LlTakbko9e6aQ6VUyKQ=";
        
        let currentJWPlayer = null;
        let isPlayerActive = false;
        let currentFocusIndex = 0;
        let focusableElements = [];
        
        function updateFocusableElements() {
            const selectors = '.channel-card, .event-card, .cat-item, .category-btn, .nav-btn, .player-back-icon, #telegramJoinLink, #laterBtn, .sports-grid > div';
            focusableElements = Array.from(document.querySelectorAll(selectors)).filter(el => {
                const isVisible = el.offsetParent !== null;
                const isNotDisabled = el.getAttribute('disabled') !== 'disabled';
                return isVisible && isNotDisabled;
            });
        }
        
        document.addEventListener('keydown', function(e) {
            const modal = document.getElementById('videoPlayerModal');
            if (modal && modal.classList.contains('active')) {
                if (e.key === 'Escape' || e.key === 'Backspace') {
                    e.preventDefault();
                    closeVideoPlayer();
                }
                return;
            }
            
            updateFocusableElements();
            if (focusableElements.length === 0) return;
            
            switch(e.key) {
                case 'ArrowDown':
                    e.preventDefault();
                    currentFocusIndex = (currentFocusIndex + 1) % focusableElements.length;
                    focusableElements[currentFocusIndex]?.focus();
                    focusableElements[currentFocusIndex]?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    currentFocusIndex = (currentFocusIndex - 1 + focusableElements.length) % focusableElements.length;
                    focusableElements[currentFocusIndex]?.focus();
                    focusableElements[currentFocusIndex]?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    if (focusableElements[currentFocusIndex]) {
                        let prevIndex = currentFocusIndex - 1;
                        if (prevIndex >= 0) {
                            currentFocusIndex = prevIndex;
                            focusableElements[currentFocusIndex]?.focus();
                        }
                    }
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    if (focusableElements[currentFocusIndex]) {
                        let nextIndex = currentFocusIndex + 1;
                        if (nextIndex < focusableElements.length) {
                            currentFocusIndex = nextIndex;
                            focusableElements[currentFocusIndex]?.focus();
                        }
                    }
                    break;
                case 'Enter':
                case ' ':
                    e.preventDefault();
                    if (document.activeElement && document.activeElement.click) {
                        document.activeElement.click();
                    }
                    break;
                case 'Backspace':
                case 'Escape':
                    e.preventDefault();
                    handleBackButton();
                    break;
            }
        });
        
        document.addEventListener('focusin', function(e) {
            const index = focusableElements.indexOf(e.target);
            if (index !== -1) {
                currentFocusIndex = index;
            }
        });

        function getValidLogoUrl(logoUrl) {
            if (logoUrl && logoUrl.startsWith('http') && (logoUrl.includes('.png') || logoUrl.includes('.jpg') || logoUrl.includes('.jpeg') || logoUrl.includes('.gif') || logoUrl.includes('.svg') || logoUrl.includes('flagcdn'))) {
                return logoUrl;
            }
            return DEFAULT_LOGO_URL;
        }

        function destroyPlayerCompletely() {
            if (currentJWPlayer) {
                try {
                    currentJWPlayer.pause(true);
                    currentJWPlayer.setMute(true);
                    currentJWPlayer.destroy();
                } catch(e) {}
