<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sportzfy TV - লাইভ স্পোর্টস ও টিভি</title>
    
    <!-- Font Awesome -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CDNBye Plugin (P2P) + JW Player -->
    <script src="https://cdn.jsdelivr.net/npm/cdnbye@latest"></script>
    <script src="https://cdn.jsdelivr.net/gh/teranode/jw-provider@0.0.9/provider.hlsjs.js"></script>
    <script src="https://ssl.p.jwpcdn.com/player/v/8.22.0/jwplayer.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #00ff88;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        .glass {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
        }
        .nav-bottom {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--glass-border);
        }
        .active-tab {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }
        .scrolling-text {
            white-space: nowrap;
            animation: scroll 20s linear infinite;
        }
        @keyframes scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .channel-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .channel-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }
        .sports-circle {
            width: 75px; height: 75px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            background: white; padding: 5px;
            display: flex; align-items: center; justify-content: center; margin: 0 auto;
        }
        .sports-circle img { width: 85%; height: 85%; object-fit: contain; }
        
        .cat-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 12px; padding: 12px;
            display: flex; align-items: center; gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cat-item:hover {
            background: rgba(0, 255, 136, 0.1);
            border-color: var(--primary);
        }
        
        .event-card {
            background: linear-gradient(135deg, #111827, #1a1f2e);
            border: 1.5px solid #00ff8855;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .event-card:hover {
            border-color: #00ff88;
            transform: scale(1.01);
        }
        .live-dot {
            height: 8px; width: 8px;
            background-color: #ff4d4d;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #ff4d4d;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .bd-time {
            font-family: 'monospace';
            font-size: 0.75rem;
            color: #00ff88;
        }
        .loading-spinner {
            text-align: center;
            padding: 2px;
            color: #00ff88;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }
        
        .sports-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        
        @media (max-width: 640px) {
            .sports-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        .category-btn {
            transition: all 0.2s;
            cursor: pointer;
        }
        .category-btn.active-tab {
            background: #00ff8822;
            border-bottom: 2px solid #00ff88;
            color: #00ff88;
        }
        
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e2e;
        }
        ::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 4px;
        }
        #drawerOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            backdrop-filter: blur(3px);
        }
        
        /* JW Player Modal Styles - Landscape mode */
        .video-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .video-modal.active {
            opacity: 1;
            visibility: visible;
        }
        .video-modal-content {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .video-modal.active .video-modal-content {
            width: 100vh;
            height: 100vw;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-49%, -50%) rotate(90deg);
        }
        
        .player-back-icon {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1002;
            cursor: pointer;
            transition: all 0.2s;
        }
        .player-back-icon i {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.7);
            text-shadow: 0 0 3px rgba(0,0,0,0.5);
        }
        .player-back-icon:hover i {
            color: #FFFFFF;
            transform: scale(1.05);
        }
        
        #jwPlayerContainer {
            width: 100%;
            height: 100%;
        }
        
        /* Telegram popup styles */
        .telegram-popup-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 200;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
        }
        .telegram-popup-overlay.show {
            transform: translateY(0);
        }
        .telegram-popup {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 24px 24px 0 0;
            border-top: 1px solid #00ff8844;
            box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.5);
        }
        
        .cursor-pointer {
            cursor: pointer;
        }
    </style>
</head>
<body class="pb-20">

    <div id="drawerOverlay" onclick="toggleDrawer()"></div>

    <!-- Telegram Join Popup -->
    <div id="telegramPopup" class="telegram-popup-overlay">
        <div class="telegram-popup p-6">
            <div class="flex justify-center mb-3">
                <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-emerald-500 rounded-full flex items-center justify-center">
                    <i class="fa-brands fa-telegram text-white text-3xl"></i>
                </div>
            </div>
            <h3 id="popupHeading" class="text-xl font-bold text-center text-white mb-2">Join Our Channel</h3>
            <p id="popupDesc" class="text-gray-300 text-center text-sm mb-5">Stay updated with latest matches and updates by joining our Telegram channel!</p>
            <div class="flex flex-col gap-3">
                <a id="telegramJoinLink" href="#" target="_blank" class="bg-gradient-to-r from-blue-600 to-emerald-600 text-white font-bold py-3 rounded-xl text-center transition hover:scale-105">Join Now</a>
                <button id="laterBtn" class="bg-slate-800 text-gray-300 font-medium py-3 rounded-xl transition hover:bg-slate-700">Later</button>
                <div id="dontShowContainer" class="flex items-center justify-center gap-2 mt-2">
                    <input type="checkbox" id="dontShowAgain" class="w-4 h-4 rounded border-gray-500 bg-transparent">
                    <label for="dontShowAgain" class="text-xs text-gray-400">Don't show again</label>
                </div>
            </div>
        </div>
    </div>

    <!-- Video Player Modal with JW Player (CDNBye P2P Enabled) - P2P Stats সরানো হয়েছে -->
    <div id="videoPlayerModal" class="video-modal">
        <div class="video-modal-content">
            <div class="player-back-icon" onclick="closeVideoPlayer()">
                <i class="fa-solid fa-arrow-left"></i>
            </div>
            <div id="jwPlayerContainer" style="width: 100%; height: 100%;"></div>
            <!-- P2P Stats Panel সম্পূর্ণ সরানো হয়েছে -->
        </div>
    </div>

    <!-- হেডার - Sportzfy TV লেখা থাকবে -->
    <header class="sticky top-0 z-50 glass m-2 p-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <button onclick="toggleDrawer()" class="text-2xl"><i class="fa-solid fa-bars-staggered"></i></button>
            <h1 class="text-xl font-bold tracking-tighter text-emerald-400">Sportzfy TV</h1>
        </div>
        <div class="flex gap-4 items-center">
            <button onclick="toggleSearch()" class="text-xl"><i class="fa-solid fa-magnifying-glass"></i></button>
            <div class="relative">
                <i class="fa-solid fa-bell text-xl"></i>
            </div>
        </div>
    </header>

    <!-- Notice Section -->
    <div class="mx-2 mb-4 overflow-hidden glass p-2 text-sm bg-emerald-900/20 text-emerald-300">  
        <div class="scrolling-text" id="noticeText">লোড হচ্ছে...</div>  
    </div>

    <div id="searchBar" class="hidden px-4 mb-4">
        <input type="text" id="searchInput" onkeyup="searchChannels()" placeholder="🔍 চ্যানেল খুঁজুন..." class="w-full p-3 rounded-xl bg-slate-800 border border-emerald-500/30 focus:outline-none focus:border-emerald-500 text-white">
    </div>

    <!-- Dynamic Category Navigation -->
    <div id="topCategoryNav" class="flex overflow-x-auto gap-3 px-4 mb-6 no-scrollbar"></div>

    <div id="mainContent" class="px-4">
        <div id="eventContainer"></div>
        <div id="channelGrid" class="channel-grid"></div>
    </div>

    <!-- Drawer Menu -->
    <div id="drawer" class="fixed inset-y-0 left-0 w-64 bg-slate-900 z-[101] transform -translate-x-full transition-transform duration-300 glass border-r border-emerald-500/20">
        <div class="p-6">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-emerald-400">মেনু</h2>
                <button onclick="toggleDrawer()" class="text-xl">&times;</button>
            </div>
            <nav class="space-y-4">
                <a href="#" onclick="initApp(); toggleDrawer(); return false;" class="flex items-center gap-3 p-3 hover:bg-emerald-500/10 rounded-lg"><i class="fa-solid fa-house"></i> Home</a>
                <a href="#" class="flex items-center gap-3 p-3 hover:bg-emerald-500/10 rounded-lg"><i class="fa-solid fa-heart"></i> Favorite</a>
                <a href="#" class="flex items-center gap-3 p-3 hover:bg-emerald-500/10 rounded-lg"><i class="fa-solid fa-gear"></i> Setting</a>
            </nav>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 h-16 nav-bottom flex justify-around items-center z-50">
        <button onclick="initApp()" class="flex flex-col items-center text-emerald-400 nav-btn" id="btnLive">
            <i class="fa-solid fa-tower-broadcast text-xl"></i>
            <span class="text-[10px]">Live Events</span>
        </button>
        <button onclick="showSportsGrid()" class="flex flex-col items-center text-gray-400 nav-btn" id="btnSports">
            <i class="fa-solid fa-volleyball text-xl"></i>
            <span class="text-[10px]">Sports</span>
        </button>
        <button onclick="showCategoriesList()" class="flex flex-col items-center text-gray-400 nav-btn" id="btnCat">
            <i class="fa-solid fa-list text-xl"></i>
            <span class="text-[10px]">Category</span>
        </button>
    </nav>

    <script>
        // ======================== JW Player with CDNBye P2P ========================
        jwplayer.key = "uoW6qHjBL3KNudxKVnwa3rt5LlTakbko9e6aQ6VUyKQ=";
        
        let currentJWPlayer = null;
        
        function openPlayerWithJW(url, title = '') {
            if (!url) return;
            
            const modal = document.getElementById('videoPlayerModal');
            const container = document.getElementById('jwPlayerContainer');
            
            // Destroy previous player if exists
            if (currentJWPlayer) {
                try {
                    currentJWPlayer.destroy();
                } catch(e) {}
                currentJWPlayer = null;
            }
            
            // Clear container
            container.innerHTML = '<div id="jwplayer"></div>';
            
            // Setup new JW Player with P2P - কোনো টেক্সট বা ওয়াটারমার্ক ছাড়া
            currentJWPlayer = jwplayer('jwplayer').setup({
                file: url,
                width: '100%',
                height: '100%',
                autostart: true,
                controls: true,
                abouttext: '',
                aboutlink: '',
                hlsjsConfig: {
                    enableWorker: true,
                    lowLatencyMode: true,
                    p2pConfig: {
                        live: true,
                        logLevel: false,
                    }
                },
            });
            
            // Show modal with landscape rotation
            modal.classList.add('active');
            
            // Lock orientation
            try {
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(e => console.log("Orientation lock not supported"));
                }
            } catch(e) {}
            
            pushUIState('player');
        }
        
        function closeVideoPlayer() {
            const modal = document.getElementById('videoPlayerModal');
            if (currentJWPlayer) {
                try {
                    currentJWPlayer.destroy();
                } catch(e) {}
                currentJWPlayer = null;
            }
            if (modal.classList.contains('active')) {
                modal.classList.remove('active');
                try {
                    if (screen.orientation && screen.orientation.unlock) {
                        screen.orientation.unlock();
                    }
                } catch(e) {}
            }
        }
        
        // ======================== Sportzfy TV Logic ========================
        
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAFBTPu9kk46xj8QWTdl-WaBZHDKjxCOzU",
            authDomain: "sportzfy-tv-5ab8d.firebaseapp.com",
            databaseURL: "https://sportzfy-tv-5ab8d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sportzfy-tv-5ab8d",
            storageBucket: "sportzfy-tv-5ab8d.firebasestorage.app",
            messagingSenderId: "1007369819584",
            appId: "1:1007369819584:web:24c91f6711928dc6ac6425"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const channelsRef = database.ref('channels');
        const eventsRef = database.ref('events');
        const noticeRef = database.ref('notice');
        const categoriesRef = database.ref('categories');
        const telegramSettingsRef = database.ref('telegramSettings');

        let channels = [];
        let liveEvents = [];
        let categories = [];
        let currentView = 'live';
        let uiStateStack = [];
        let telegramSettings = {
            enabled: true,
            link: '',
            heading: 'Join Our Channel',
            description: 'Stay updated with latest matches and updates by joining our Telegram channel!',
            btnText: 'Join Now',
            laterText: 'Later',
            showDontShow: true
        };
        let popupClosedForSession = false;

        const TEST_STREAMS = [
            "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
            "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8"
        ];
        
        function getValidStreamUrl(url) {
            if (!url) return TEST_STREAMS[0];
            if (url.startsWith('http') && (url.includes('.m3u8') || url.includes('.mp4') || url.includes('.mkv') || url.includes('.mov'))) {
                return url;
            }
            return TEST_STREAMS[0];
        }

        function openPlayer(item, isEvent = false) {
            if (!item) return;
            let streamUrl = item.url || TEST_STREAMS[0];
            streamUrl = getValidStreamUrl(streamUrl);
            openPlayerWithJW(streamUrl, item.name || (isEvent ? `${item.team1} vs ${item.team2}` : ''));
        }
        
        function handleBackButton() {
            const modal = document.getElementById('videoPlayerModal');
            if (modal && modal.classList.contains('active')) {
                closeVideoPlayer();
                return true;
            }
            const drawer = document.getElementById('drawer');
            if (drawer && drawer.classList.contains('translate-x-0')) {
                toggleDrawer();
                return true;
            }
            const searchBar = document.getElementById('searchBar');
            if (searchBar && !searchBar.classList.contains('hidden')) {
                searchBar.classList.add('hidden');
                return true;
            }
            return false;
        }

        function pushUIState(state) {
            uiStateStack.push(state);
            history.pushState({ state: state }, '');
        }

        window.addEventListener('popstate', function(event) {
            handleBackButton();
        });

        window.addEventListener('load', () => {
            history.replaceState({ state: 'default' }, '');
            uiStateStack = [];
        });

        function loadCategories() {
            categoriesRef.on('value', (snapshot) => {
                categories = [];
                if (snapshot.exists()) {
                    snapshot.forEach((child) => {
                        categories.push(child.val());
                    });
                }
                if (categories.length === 0) {
                    categories = ['Sports', 'News', 'Movies', 'Kids', 'Music'];
                }
                renderCategoryNav();
            });
        }

        function renderCategoryNav() {
            const container = document.getElementById('topCategoryNav');
            if (!container) return;
            container.innerHTML = `<button onclick="filterChannels('All')" class="category-btn glass px-6 py-2 whitespace-nowrap active-tab">All</button>` +
                categories.map(cat => `<button onclick="filterChannels('${cat.replace(/'/g, "\\'")}')" class="category-btn glass px-6 py-2 whitespace-nowrap">${cat}</button>`).join('');
        }

        function loadChannels() {
            channelsRef.on('value', (snapshot) => {
                const newChannels = [];
                if (snapshot.exists()) {
                    snapshot.forEach((child) => {
                        newChannels.push({
                            id: child.key,
                            ...child.val()
                        });
                    });
                }
                channels = newChannels;
                renderCurrentView();
            });
        }

        function loadEvents() {
            eventsRef.on('value', (snapshot) => {
                const newEvents = [];
                if (snapshot.exists()) {
                    snapshot.forEach((child) => {
                        newEvents.push({
                            id: child.key,
                            ...child.val()
                        });
                    });
                }
                liveEvents = newEvents;
                if (currentView === 'live') {
                    renderHomeEvents();
                }
            });
        }

        function loadNotice() {
            noticeRef.on('value', (snapshot) => {
                const notice = snapshot.val();
                document.getElementById('noticeText').innerHTML = (notice && notice.text) ? notice.text : '🏏 স্বাগতম Sportzfy TV তে! লাইভ স্পোর্টস উপভোগ করুন';
            });
        }

        function renderCurrentView() {
            if (currentView === 'live') initApp();
            else if (currentView === 'sports') showSportsGrid();
            else if (currentView === 'categories') showCategoriesList();
        }

        function renderHomeEvents() {
            const eventDiv = document.getElementById('eventContainer');
            if (!eventDiv) return;
            
            if (liveEvents.length > 0) {
                eventDiv.innerHTML = liveEvents.map(ev => {
                    const safeEvent = {
                        team1: ev.team1 || 'টিম ১',
                        team2: ev.team2 || 'টিম ২',
                        url: ev.url || TEST_STREAMS[0],
                        t1Logo: ev.t1Logo || '',
                        t2Logo: ev.t2Logo || '',
                        type: ev.type || 'লাইভ ম্যাচ'
                    };
                    const escapedEv = JSON.stringify(safeEvent).replace(/'/g, "&#39;");
                    return `<div class="event-card" onclick='openPlayer(${escapedEv.replace(/"/g, '&quot;')}, true)'>
                        <div class="flex justify-center items-center gap-1 mb-1 text-[9px] font-bold text-gray-400"><i class="fa-solid fa-circle-nodes text-emerald-400"></i> ${ev.type || 'লাইভ ম্যাচ'}</div>
                        <div class="flex justify-between items-center px-4 md:px-8">
                            <div class="flex flex-col items-center text-center w-24"><img src="${ev.t1Logo || ''}" class="w-12 h-12 rounded-full object-cover bg-slate-800" onerror="this.src='https://placehold.co/60x60/1e293b/ffffff?text=Team1'"><span class="text-[11px] md:text-[13px] font-bold mt-1 truncate max-w-[80px]">${ev.team1 || 'টিম ১'}</span></div>
                            <div class="flex flex-col items-center"><span class="live-dot mb-1"></span><span class="text-[8px] md:text-[10px] text-red-500 font-bold uppercase">Live Now</span></div>
                            <div class="flex flex-col items-center text-center w-24"><img src="${ev.t2Logo || ''}" class="w-12 h-12 rounded-full object-cover bg-slate-800" onerror="this.src='https://placehold.co/60x60/1e293b/ffffff?text=Team2'"><span class="text-[11px] md:text-[13px] font-bold mt-1 truncate max-w-[80px]">${ev.team2 || 'টিম ২'}</span></div>
                        </div>
                        <div class="text-center bd-time mt-2"></div>
                    </div>`;
                }).join('');
            } else {
                eventDiv.innerHTML = `<div class="glass p-4 text-center text-gray-400 mb-4">কোন লাইভ ইভেন্ট নেই</div>`;
            }
            updateTime();
        }

        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-GB', { timeZone: 'Asia/Dhaka', hour12: false });
            document.querySelectorAll('.bd-time').forEach(el => el.innerText = `🕒 ${timeStr}`);
        }

        function initApp() {
            currentView = 'live';
            updateNav('btnLive');
            const topNav = document.getElementById('topCategoryNav');
            if (topNav) topNav.style.display = 'flex';
            renderHomeEvents();
            
            const grid = document.getElementById('channelGrid');
            if (!grid) return;
            
            if (channels.length === 0) {
                grid.innerHTML = '<div class="loading-spinner"><i class="fa-solid fa-spinner fa-spin"></i> চ্যানেল লোড হচ্ছে...</div>';
                return;
            }
            
            grid.className = "channel-grid";
            grid.innerHTML = channels.map(ch => {
                const safeCh = {
                    id: ch.id,
                    name: ch.name || 'চ্যানেল',
                    logo: ch.logo || '',
                    category: ch.category || 'জেনারেল',
                    desc: ch.desc || '',
                    url: ch.url || TEST_STREAMS[0]
                };
                const escapedCh = JSON.stringify(safeCh).replace(/'/g, "&#39;");
                return `<div class="glass p-4 channel-card rounded-xl" onclick='openPlayer(${escapedCh.replace(/"/g, '&quot;')}, false)'>
                    <div class="flex gap-4 items-center"><img src="${ch.logo || 'https://placehold.co/60x60/1e293b/ffffff?text=TV'}" class="w-16 h-16 rounded-lg object-contain bg-white p-1" onerror="this.src='https://placehold.co/60x60/1e293b/ffffff?text=TV'"><div><h3 class="font-bold text-white">${escapeHtml(ch.name)}</h3><span class="text-xs text-emerald-400 bg-emerald-400/10 px-2 py-0.5 rounded inline-block mt-1">${ch.category || 'জেনারেল'}</span><p class="text-[11px] text-gray-400 mt-1 truncate w-40">${escapeHtml(ch.desc || '')}</p></div></div>
                </div>`;
            }).join('');
        }

        function escapeHtml(str) { 
            if (!str) return ''; 
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); 
        }

        function showSportsGrid() {
            currentView = 'sports';
            updateNav('btnSports');
            const topNav = document.getElementById('topCategoryNav');
            if (topNav) topNav.style.display = 'none';
            document.getElementById('eventContainer').innerHTML = '';
            const grid = document.getElementById('channelGrid');
            const sports = channels.filter(c => c.category === 'Sports');
            grid.className = "sports-grid";
            if(sports.length === 0) {
                grid.innerHTML = '<p class="text-gray-400 text-center col-span-full">কোন স্পোর্টস চ্যানেল নেই</p>';
            } else {
                grid.innerHTML = sports.map(ch => {
                    const safeCh = { name: ch.name, url: ch.url, logo: ch.logo };
                    const escapedCh = JSON.stringify(safeCh).replace(/'/g, "&#39;");
                    return `<div class="text-center cursor-pointer bg-slate-800 p-3 rounded-xl hover:bg-slate-700 transition" onclick='openPlayer(${escapedCh.replace(/"/g, '&quot;')}, false)'><div class="sports-circle"><img src="${ch.logo || 'https://placehold.co/60x60/1e293b/ffffff?text=TV'}" onerror="this.src='https://placehold.co/60x60/1e293b/ffffff?text=TV'"></div><p class="text-xs mt-1 truncate">${escapeHtml(ch.name)}</p></div>`;
                }).join('');
            }
        }

        function showCategoriesList() {
            currentView = 'categories';
            updateNav('btnCat');
            const topNav = document.getElementById('topCategoryNav');
            if (topNav) topNav.style.display = 'none';
            document.getElementById('eventContainer').innerHTML = '';
            const grid = document.getElementById('channelGrid');
            grid.className = "grid grid-cols-2 gap-4";
            grid.innerHTML = categories.map(cat => `<div class="cat-item" onclick="filterChannels('${cat.replace(/'/g, "\\'")}')"><div class="w-8 h-8 flex items-center justify-center bg-emerald-500/20 rounded-full text-lg">📁</div><span class="font-bold text-sm">${cat}</span></div>`).join('');
        }

        function filterChannels(cat) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active-tab'));
            const btns = document.querySelectorAll('.category-btn');
            btns.forEach(btn => { if(btn.innerText === cat || (cat === 'All' && btn.innerText === 'All')) btn.classList.add('active-tab'); });
            
            if(cat === 'All') { 
                renderHomeEvents(); 
                const filtered = channels; 
                const grid = document.getElementById('channelGrid'); 
                grid.className = "channel-grid"; 
                grid.innerHTML = filtered.map(ch => `<div class="glass p-4 channel-card rounded-xl" onclick='openPlayer(${JSON.stringify({ name: ch.name, logo: ch.logo, category: ch.category, url: ch.url }).replace(/'/g, "&#39;").replace(/"/g, '&quot;')}, false)'><div class="flex gap-4 items-center"><img src="${ch.logo || 'https://placehold.co/60x60/1e293b/ffffff?text=TV'}" class="w-16 h-16 rounded-lg object-contain bg-white p-1"><div><h3 class="font-bold text-white">${escapeHtml(ch.name)}</h3><span class="text-xs text-emerald-400 bg-emerald-400/10 px-2 py-0.5 rounded inline-block mt-1">${ch.category || 'জেনারেল'}</span></div></div></div>`).join(''); 
                return; 
            }
            
            document.getElementById('eventContainer').innerHTML = '';
            const filtered = channels.filter(c => c.category === cat);
            const grid = document.getElementById('channelGrid');
            grid.className = "channel-grid";
            if(filtered.length === 0) {
                grid.innerHTML = `<p class="text-gray-400 text-center col-span-full">${cat} ক্যাটাগরিতে কোন চ্যানেল নেই</p>`;
            } else {
                grid.innerHTML = filtered.map(ch => `<div class="glass p-4 channel-card rounded-xl" onclick='openPlayer(${JSON.stringify({ name: ch.name, logo: ch.logo, category: ch.category, url: ch.url }).replace(/'/g, "&#39;").replace(/"/g, '&quot;')}, false)'><div class="flex gap-4 items-center"><img src="${ch.logo || 'https://placehold.co/60x60/1e293b/ffffff?text=TV'}" class="w-16 h-16 rounded-lg object-contain bg-white p-1"><div><h3 class="font-bold text-white">${escapeHtml(ch.name)}</h3><span class="text-xs text-emerald-400 bg-emerald-400/10 px-2 py-0.5 rounded inline-block mt-1">${ch.category}</span></div></div></div>`).join('');
            }
        }

        function updateNav(id) { 
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('text-emerald-400'); b.classList.add('text-gray-400'); }); 
            const btn = document.getElementById(id); if(btn) { btn.classList.remove('text-gray-400'); btn.classList.add('text-emerald-400'); }
        }
        
        function toggleSearch() { 
            const searchBar = document.getElementById('searchBar');
            if (searchBar) {
                if (searchBar.classList.contains('hidden')) { 
                    searchBar.classList.remove('hidden'); 
                    pushUIState('search'); 
                } else { 
                    searchBar.classList.add('hidden'); 
                    if (uiStateStack[uiStateStack.length-1] === 'search') uiStateStack.pop(); 
                    history.replaceState({ state: uiStateStack[uiStateStack.length-1] || 'default' }, ''); 
                }
            }
        }
        
        function searchChannels() { 
            const term = document.getElementById('searchInput').value.toLowerCase(); 
            const filtered = channels.filter(c => c.name && c.name.toLowerCase().includes(term)); 
            const grid = document.getElementById('channelGrid');
            if(!grid) return;
            grid.className = "channel-grid";
            if(filtered.length === 0) {
                grid.innerHTML = '<p class="text-gray-400 text-center col-span-full">কোন চ্যানেল পাওয়া যায়নি</p>';
            } else {
                grid.innerHTML = filtered.map(ch => `<div class="glass p-4 channel-card rounded-xl" onclick='openPlayer(${JSON.stringify({ name: ch.name, logo: ch.logo, category: ch.category, url: ch.url }).replace(/'/g, "&#39;").replace(/"/g, '&quot;')}, false)'><div class="flex gap-4 items-center"><img src="${ch.logo || 'https://placehold.co/60x60/1e293b/ffffff?text=TV'}" class="w-16 h-16 rounded-lg object-contain bg-white p-1"><div><h3 class="font-bold text-white">${escapeHtml(ch.name)}</h3><span class="text-xs text-emerald-400 bg-emerald-400/10 px-2 py-0.5 rounded inline-block mt-1">${ch.category}</span></div></div></div>`).join('');
            }
        }

        function toggleDrawer() {
            const drawer = document.getElementById('drawer');
            const overlay = document.getElementById('drawerOverlay');
            const isOpen = drawer.classList.contains('translate-x-0');
            if (isOpen) { 
                drawer.classList.replace('translate-x-0', '-translate-x-full'); 
                overlay.style.display = 'none'; 
                if (uiStateStack[uiStateStack.length-1] === 'drawer') uiStateStack.pop(); 
                history.replaceState({ state: uiStateStack[uiStateStack.length-1] || 'default' }, ''); 
            } else { 
                drawer.classList.replace('-translate-x-full', 'translate-x-0'); 
                overlay.style.display = 'block'; 
                pushUIState('drawer'); 
            }
        }

        function loadTelegramSettings() {
            telegramSettingsRef.on('value', (snap) => {
                const settings = snap.val();
                if (settings) {
                    telegramSettings = {
                        enabled: settings.enabled !== false,
                        link: settings.link || '',
                        heading: settings.heading || 'Join Our Channel',
                        description: settings.description || settings.desc || 'Stay updated with latest matches and updates by joining our Telegram channel!',
                        btnText: settings.btnText || 'Join Now',
                        laterText: settings.laterText || 'Later',
                        showDontShow: settings.showDontShow !== false
                    };
                }
                updateTelegramPopupUI();
                checkAndShowTelegramPopup();
            });
        }

        function updateTelegramPopupUI() {
            document.getElementById('popupHeading').innerText = telegramSettings.heading;
            document.getElementById('popupDesc').innerText = telegramSettings.description;
            
            let tgLink = telegramSettings.link;
            if (tgLink && !tgLink.startsWith('http') && !tgLink.startsWith('https')) {
                if (tgLink.startsWith('@')) {
                    tgLink = 'https://t.me/' + tgLink.substring(1);
                } else {
                    tgLink = 'https://t.me/' + tgLink;
                }
            }
            const joinBtn = document.getElementById('telegramJoinLink');
            joinBtn.href = tgLink || 'https://t.me/sportzfy_updates';
            joinBtn.innerText = telegramSettings.btnText;
            
            document.getElementById('laterBtn').innerText = telegramSettings.laterText;
            
            const dontShowContainer = document.getElementById('dontShowContainer');
            if (telegramSettings.showDontShow) {
                dontShowContainer.style.display = 'flex';
            } else {
                dontShowContainer.style.display = 'none';
            }
        }

        function checkAndShowTelegramPopup() {
            if (!telegramSettings.enabled) return;
            if (popupClosedForSession) return;
            
            const dontShowAgain = localStorage.getItem('telegram_dont_show_again');
            if (dontShowAgain === 'true') return;
            
            setTimeout(() => {
                const popup = document.getElementById('telegramPopup');
                popup.classList.add('show');
            }, 3000);
        }

        function closeTelegramPopup(permanently = false) {
            const popup = document.getElementById('telegramPopup');
            popup.classList.remove('show');
            if (permanently) {
                localStorage.setItem('telegram_dont_show_again', 'true');
            } else {
                popupClosedForSession = true;
            }
        }

        document.getElementById('laterBtn').addEventListener('click', () => {
            closeTelegramPopup(false);
        });
        
        document.getElementById('telegramJoinLink').addEventListener('click', () => {
            const dontShowCheckbox = document.getElementById('dontShowAgain');
            if (dontShowCheckbox && dontShowCheckbox.checked) {
                localStorage.setItem('telegram_dont_show_again', 'true');
            }
            closeTelegramPopup(false);
        });

        if (document.getElementById('dontShowAgain')) {
            document.getElementById('dontShowAgain').addEventListener('change', (e) => {
                if (e.target.checked) {
                    localStorage.setItem('telegram_dont_show_again', 'true');
                } else {
                    localStorage.removeItem('telegram_dont_show_again');
                }
            });
        }

        setInterval(updateTime, 1000);

        loadCategories();
        loadChannels();
        loadEvents();
        loadNotice();
        loadTelegramSettings();

        // Make functions global
        window.openPlayer = openPlayer;
        window.closeVideoPlayer = closeVideoPlayer;
        window.filterChannels = filterChannels;
        window.toggleSearch = toggleSearch;
        window.toggleDrawer = toggleDrawer;
        window.initApp = initApp;
        window.showSportsGrid = showSportsGrid;
        window.showCategoriesList = showCategoriesList;
    </script>
</body>
</html>
